name: Claude Review
# PR 열 때 자동 1회 리뷰(비용 절약 / synchronize 제외). 추가 리뷰는 PR 코멘트에 @claude 멘션.
on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write   # 액션이 OAuth 토큰 → GitHub App 토큰 교환에 OIDC 사용

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude PR Review
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}   # Claude의 gh pr comment(요약)용
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            이 PR을 한국어로 리뷰해줘. 너의 리뷰는 머지 게이트가 아니라 1차 점검이다 /
            사람이 보기 전에 자잘한 문제를 걸러주는 도우미 역할. 최종 승인·머지는 사람이 한다.

            저장소: ${{ github.repository }} (프론트: Vite / React / TS / Tailwind / shadcn)

            절차:
            1. repo에 CLAUDE.md가 있으면 먼저 읽어 프로젝트 규칙·계약·경계를 파악한다.
            2. PR diff를 검토한다. 특히:
               - API 계약(src/api/types.ts / result_dict 매핑 / 어댑터) 임의 변경 여부
               - 비밀키·토큰 하드코딩 여부
               - mock/real 게이팅(USE_MOCK / MOCK_LOGIN) 위반 여부
               - null·undefined 처리 / 엣지케이스 누락 / 명백한 버그
               - 불필요한 복잡도·추측성 코드 / 커밋·PR 컨벤션
            3. 문제가 있는 정확한 라인에 인라인 코멘트를 단다
               (mcp__github_inline_comment__create_inline_comment 사용).
               각 코멘트: 무엇이 문제인지 / 왜 중요한지 / 제안 수정.
            4. 반드시 gh pr comment $PR_NUMBER --body "..." 로 요약 코멘트 1개를 남긴다
               (PR_NUMBER=${{ github.event.pull_request.number || github.event.issue.number }}).
               전반 평가 + 머지 전 사람이 꼭 확인할 점. 문제가 없어도 "✅ 통과" 코멘트를 꼭 남긴다.

            과한 지적보다 신뢰도 높은 핵심 위주로.
          claude_args: |
            --max-turns 20
            --allowedTools "Read,Bash(git:*),Bash(gh pr diff:*),Bash(gh pr view:*),mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*)"
